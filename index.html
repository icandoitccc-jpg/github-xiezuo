<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>WorkBuddy Reports</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; max-width: 680px; margin: 60px auto; padding: 20px; background: #fafafa; color: #333; }
  h1 { font-size: 24px; margin-bottom: 8px; }
  p.subtitle { color: #888; margin-bottom: 32px; }
  .card { background: white; border-radius: 12px; padding: 20px; margin-bottom: 16px; box-shadow: 0 2px 8px rgba(0,0,0,0.06); display: flex; align-items: center; gap: 16px; }
  .card-icon { font-size: 32px; }
  .card-info h3 { font-size: 16px; margin-bottom: 4px; }
  .card-info p { font-size: 13px; color: #888; }
  .card a { text-decoration: none; color: #333; display: block; }
  .card:hover { box-shadow: 0 4px 16px rgba(0,0,0,0.1); }
  .new-badge { background: #e8783b; color: white; font-size: 11px; padding: 2px 8px; border-radius: 10px; margin-left: 8px; }
</style>
</head>
<body>
<h1>WorkBuddy Reports</h1>
<p class="subtitle">由 WorkBuddy 生成的项目报告与工具</p>

<div class="card">
  <div class="card-icon">🐾</div>
  <div class="card-info">
    <a href="shelter/">
      <h3>动物救助募捐系统 <span class="new-badge">NEW</span></h3>
      <p>基地动物档案展示 · 动态更新 · 捐助记录追踪 · 领养入口</p>
    </a>
  </div>
</div>


</body>
</html>
